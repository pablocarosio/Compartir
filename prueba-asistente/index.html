<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba · Comparativa de escenarios</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 24px;
    color: #1a1a1a;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    padding: 32px;
  }
  h1 { color: #1f3864; margin: 0 0 8px; font-size: 24px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .btn {
    background: white;
    border: 1px solid #d0d7de;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }
  .btn:hover { background: #f6f8fa; }
  .btn.active {
    background: #1f3864;
    color: white;
    border-color: #1f3864;
  }
  .chart-container {
    position: relative;
    height: 420px;
    margin-bottom: 24px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 24px;
  }
  .stat-card {
    background: #f6f8fa;
    border-left: 4px solid #1f3864;
    padding: 12px 16px;
    border-radius: 4px;
  }
  .stat-card .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 20px; font-weight: 600; color: #1f3864; margin-top: 4px; }
  .footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid #e1e4e8;
    color: #888;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>📊 Comparativa de escenarios — DD Transporte</h1>
    <p class="subtitle">Prueba interactiva publicada vía GitHub Pages · Pasá el mouse sobre las barras para ver detalles</p>

    <div class="controls">
      <button class="btn active" data-metric="neto">Resultado Neto</button>
      <button class="btn" data-metric="ventas">Ventas</button>
      <button class="btn" data-metric="margen">Margen %</button>
    </div>

    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>

    <div class="stats" id="stats"></div>

    <div class="footer">
      Generado por Asistente Personal · Pablo Carosio · <span id="fecha"></span>
    </div>
  </div>

<script>
const data = {
  labels: ['Real 2025', 'Conservador (13×8)', 'Productivo (10×11,8)', 'Normal (13×10)', 'Optimista (13×12)'],
  neto:    [235, 76, 503, 416, 755],
  ventas:  [2691, 2834, 3216, 3543, 4251],
  margen:  [8.74, 2.70, 15.65, 11.75, 17.75],
  colors:  ['#7c8a99', '#e67e22', '#27ae60', '#3498db', '#1f3864']
};

const formatos = {
  neto: { suffix: 'M', titulo: 'Resultado Neto Anual ($M)', stat: v => '$' + v + 'M' },
  ventas: { suffix: 'M', titulo: 'Ventas Anuales ($M)', stat: v => '$' + v.toLocaleString() + 'M' },
  margen: { suffix: '%', titulo: 'Margen Neto sobre Ventas', stat: v => v.toFixed(2) + '%' }
};

let currentMetric = 'neto';
let chart;

function renderChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.labels,
      datasets: [{
        label: formatos[currentMetric].titulo,
        data: data[currentMetric],
        backgroundColor: data.colors,
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: formatos[currentMetric].titulo,
          font: { size: 16, weight: 'bold' },
          color: '#1f3864',
          padding: { bottom: 20 }
        },
        tooltip: {
          backgroundColor: 'rgba(31, 56, 100, 0.95)',
          padding: 12,
          titleFont: { size: 14 },
          bodyFont: { size: 13 },
          callbacks: {
            label: function(ctx) {
              return '  ' + formatos[currentMetric].stat(ctx.parsed.y);
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          grid: { color: '#e1e4e8' },
          ticks: {
            callback: v => formatos[currentMetric].suffix === '%' ? v + '%' : '$' + v + 'M'
          }
        },
        x: {
          grid: { display: false },
          ticks: { font: { size: 12 } }
        }
      }
    }
  });
}

function renderStats() {
  const cards = data.labels.map((l, i) => `
    <div class="stat-card" style="border-left-color: ${data.colors[i]}">
      <div class="label">${l}</div>
      <div class="value">${formatos[currentMetric].stat(data[currentMetric][i])}</div>
    </div>
  `).join('');
  document.getElementById('stats').innerHTML = cards;
}

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMetric = btn.dataset.metric;
    renderChart();
    renderStats();
  });
});

document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-AR');
renderChart();
renderStats();
</script>
</body>
</html>
